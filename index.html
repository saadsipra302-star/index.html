<!DOCTYPE html>

<head>

<title>Business Navigation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.navbar{
    background:#0d6efd;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    list-style:none;
    display:flex;
}

.nav-links li{
    position:relative;
}

.nav-links li a{
    color:white;
    text-decoration:none;
    padding:15px 20px;
    display:block;
}

.nav-links li a:hover{
    background:#084298;
}

.dropdown{
    display:none;
    position:absolute;
    background:white;
    min-width:180px;
    top:100%;
    left:0;
}

.dropdown a{
    color:black !important;
}

.nav-links li:hover .dropdown{
    display:block;
}

.menu-btn{
    display:none;
    color:white;
    font-size:30px;
    cursor:pointer;
}

#menu{
    display:none;
}

@media(max-width:768px){

.nav-links{
    display:none;
    flex-direction:column;
    width:100%;
    background:#0d6efd;
    position:absolute;
    top:70px;
    left:0;
}

.nav-links li{
    text-align:center;
}

#menu:checked ~ .nav-links{
    display:flex;
}

.menu-btn{
    display:block;
}
}

</style>
</head>
<body>

<nav class="navbar">

<div class="logo">Saad Business</div>

<label for="menu" class="menu-btn">☰</label>
<input type="checkbox" id="menu">

<ul class="nav-links">

<li><a href="#">Home</a></li>

<li><a href="#">About</a></li>

<li>
<a href="#">Services ▼</a>

<div class="dropdown">
<a href="#">Web Design</a>
<a href="#">SEO</a>
<a href="#">Digital Marketing</a>
</div>

</li>

<li><a href="#">Portfolio</a></li>

<li><a href="#">Contact</a></li>

</ul>

</nav>
<section style="text-align:center; padding:80px;">
    <h1>Mohsin</h1>
    <p>Welcome To My Business Website</p>
</section>

</body>
</html>
